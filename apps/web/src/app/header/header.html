<header class="app-header">
  <div class="brand">Expenses</div>
  <nav class="nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Forecast</a>
    <a routerLink="/recurring" routerLinkActive="active">Recurring</a>
    <a routerLink="/history" routerLinkActive="active">History</a>
    <a routerLink="/settings" routerLinkActive="active">Settings</a>
  </nav>
  @if (auth.initError(); as err) {
    <div class="init-error" role="alert">{{ err }}</div>
  }
  @if (auth.enabled()) {
    @if (auth.isSignedIn()) {
      <div class="user">
        <span class="who">{{ auth.displayName() }}</span>
        <button type="button" (click)="signOut()">Sign out</button>
      </div>
    } @else {
      <button type="button" class="primary" (click)="signIn()">
        Sign in with Microsoft
      </button>
    }
  } @else {
    <span class="badge">dump mode</span>
  }
</header>
