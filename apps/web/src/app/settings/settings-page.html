<section class="page">
  <h1>Settings</h1>
  @if (loading()) {
    <p>Loading…</p>
  } @else if (error(); as e) {
    <p class="error">{{ e }}</p>
  } @else if (settings(); as s) {
    <dl>
      <dt>Threshold</dt>
      <dd>{{ s.threshold }}</dd>
      <dt>Timezone</dt>
      <dd>{{ s.timezone }}</dd>
      <dt>Horizon (months)</dt>
      <dd>{{ s.horizonMonths }}</dd>
      <dt>Currency</dt>
      <dd>{{ s.currency }}</dd>
    </dl>
    <p class="muted">Editing will be added in Wave 2e.</p>
  }
</section>
