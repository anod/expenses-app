# Production compose file for the LXC deployment.
#
# Default usage (pulls pre-built image from GHCR):
#   docker compose -f compose.deploy.yml pull && \
#     docker compose -f compose.deploy.yml up -d
#
# Local-build usage (fallback when GHCR is unreachable or for testing
# uncommitted changes):
#   docker compose -f compose.deploy.yml -f compose.build.yml up -d --build
#
# The app listens on 4000 inside the LXC and is exposed only on loopback.
# Tailscale's `tailscale serve` (or a local reverse proxy) handles TLS and
# tailnet exposure on top.
services:
  expenses:
    image: ${EXPENSES_IMAGE:-ghcr.io/anod/expenses-app:latest}
    container_name: expenses
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
